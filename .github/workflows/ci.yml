name: CI

on: [push, pull_request]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { php: '8.1', symfony: '^6.4', orm: '^2.13' }
          - { php: '8.2', symfony: '^7.2', orm: '^3.0' }
          - { php: '8.3', symfony: '^7.3', orm: '^3.0' }
          - { php: '8.4', symfony: '^7.3', orm: '^3.0' }
          - { php: '8.4', symfony: '^8.0', orm: '^3.0' }
          - { php: '8.5', symfony: '^8.0', orm: '^3.0' }

    name: PHP ${{ matrix.php }} / Symfony ${{ matrix.symfony }} / ORM ${{ matrix.orm }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl
          coverage: none
          tools: composer:v2

      - name: Pin Symfony and Doctrine versions
        run: |
          composer require --no-update \
            "symfony/validator:${{ matrix.symfony }}" \
            "symfony/dependency-injection:${{ matrix.symfony }}" \
            "doctrine/orm:${{ matrix.orm }}"
          composer require --no-update --dev \
            "symfony/phpunit-bridge:${{ matrix.symfony }}" \
            "symfony/var-dumper:${{ matrix.symfony }}"

      - name: Install Composer dependencies
        run: composer update --no-progress --prefer-dist

      - name: PHPUnit
        run: vendor/bin/phpunit

  static:
    runs-on: ubuntu-latest
    name: Static analysis (PHP 8.4)
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer update --no-progress --prefer-dist

      - name: PHPStan
        run: vendor/bin/phpstan analyse

      - name: Pint (dry-run)
        run: vendor/bin/pint --test
